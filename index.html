<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My counter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/syle.css">
</head>
<body>

<div class="container py-5 min-vh-100 d-flex align-items-center justify-content-center">
    <div class="card shadow-sm w-100" style="max-width: 480px;">
        <div class="card-body text-center p-4">
            <h1 class="card-title mb-4 fw-bold display-4">My Counter</h1>
            <div class="counter-display bg-white rounded-4 py-4 mb-4">
                <span id="countLabel" class="display-1 fw-bold text-primary">0</span>
            </div>
            <div id="btnContainer" class="d-flex flex-column flex-sm-row justify-content-center gap-3">
                <button id="decreaseBtn" type="button" class="btn btn-outline-primary btn-lg flex-fill">Decrease</button>
                <button id="resetBtn" type="button" class="btn btn-secondary btn-lg flex-fill">Reset</button>
                <button id="increaseBtn" type="button" class="btn btn-primary btn-lg flex-fill">Increase</button>
            </div>
        </div>
    </div>
</div>

<script src="index.js"></script>
</body>
</html>
